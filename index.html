<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CheeseHub — CheeseHeart 的公司级 Agent Skills 仓库。工具应自建，而非采购。" />
    <!-- 防 FOUC：CSS 加载前先确定主题并设置背景色 -->
    <script>
      (function () {
        var theme = localStorage.getItem('cheesehub-theme') || 'dark'
        if (theme !== 'dark' && theme !== 'light') theme = 'dark'
        var root = document.documentElement
        root.classList.add(theme)
        root.style.backgroundColor = theme === 'dark' ? '#09090b' : '#ffffff'
      })()
    </script>
    <title>CheeseHub — Cheese for your Agents.</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
